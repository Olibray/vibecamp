<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Received — Vibe Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0D1B2A; color: white;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
    }
    .card { max-width: 480px; }
    .emoji { font-size: 3.5rem; margin-bottom: 28px; display: block; }
    h1 {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(2rem, 5vw, 3rem); color: white; margin-bottom: 20px;
    }
    p { color: rgba(255,255,255,0.55); line-height: 1.75; margin-bottom: 16px; }
    a {
      display: inline-block; margin-top: 24px;
      background: #F4813A; color: white; text-decoration: none;
      padding: 14px 32px; border-radius: 8px; font-weight: 600;
      font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase;
      transition: background 0.2s;
    }
    a:hover { background: #F9A86E; }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🏕️</span>
    <h1>You're on the list.</h1>
    <p>Application received. We'll review it and come back to you within 48 hours to confirm your spot.</p>
    <p>In the meantime — maybe start thinking about what you want to build.</p>
    <a href="/">← Back to Vibe Camp</a>
  </div>
</body>
</html>
